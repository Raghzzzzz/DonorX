<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Trail - DonorX</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 20px;
            width: 2px;
            background: #E5E7EB;
        }

        .timeline-item {
            position: relative;
            padding-left: 60px;
            padding-bottom: 2rem;
        }

        .timeline-dot {
            position: absolute;
            left: 11px;
            top: 0;
            width: 20px;
            height: 20px;
            background: white;
            border: 4px solid var(--primary-color);
            border-radius: 50%;
            z-index: 10;
        }

        .timeline-content {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .hash-id {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: #F3F4F6;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="container flex justify-between items-center" style="height: 100%;">
            <a href="index.html" class="logo">
                <span style="color: var(--primary-color);">Donor</span><span
                    style="color: var(--text-primary);">X</span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="audit.html" class="active">Audit Trail</a>
                <a href="request.html" class="btn btn-primary" style="padding: 0.5rem 1rem; color: white;">New
                    Request</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 4rem 1rem;">
        <div style="text-align: center; margin-bottom: 3rem;">
            <div class="badge" style="background: #EEF2FF; color: #4F46E5; display: inline-block; margin-bottom: 1rem;">
                Blockchain Prototype</div>
            <h2>Immutable Audit Log</h2>
            <p style="color: var(--text-secondary); max-width: 600px; margin: 0.5rem auto;">
                All system actions are cryptographically logged to ensure transparency, accountability, and trust
                between hospitals and donors.
            </p>
        </div>

        <div class="timeline animate-fade-in" id="timelineContainer">
            <!-- Timeline items generated by JS -->
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        function renderAuditLog() {
            const logs = app.getAuditLogs();
            const container = document.getElementById('timelineContainer');

            if (logs.length === 0) {
                container.innerHTML = '<p class="text-center">No logs found.</p>';
                return;
            }

            logs.forEach((log, index) => {
                const div = document.createElement('div');
                div.className = 'timeline-item';

                // Mock Hash generation for visual effect
                const mockHash = '0x' + Math.random().toString(16).substr(2, 40);

                div.innerHTML = `
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="flex justify-between items-center" style="margin-bottom: 0.5rem;">
                            <span class="hash-id">TX: ${mockHash.substr(0, 16)}...</span>
                            <span style="font-size: 0.875rem; color: var(--text-secondary);">${app.formatDate(log.timestamp)}</span>
                        </div>
                        <h3 style="font-size: 1.1rem; margin-bottom: 0.25rem;">${log.action}</h3>
                        <p style="color: var(--text-secondary);">${log.details}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        renderAuditLog();
    </script>
</body>

</html>
